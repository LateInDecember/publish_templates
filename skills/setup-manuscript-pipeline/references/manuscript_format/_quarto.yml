project:
  type: default
  output-dir: 05_output

format:
  docx:
    toc: false
    number-sections: false
    reference-doc: 01_source/styles/reference-nanum-myeongjo.docx
  html:
    toc: true
    toc-depth: 2
    number-sections: false
    theme: cosmo
    css: 01_source/styles/manuscript.css
